<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, setDoc, getDoc, getDocs, onSnapshot, deleteDoc, writeBatch }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, createUserWithEmailAndPassword, sendPasswordResetEmail, updatePassword }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // Configuração atualizada com os dados das suas imagens
  const firebaseConfig = {
    apiKey: "AIzaSyAs79v5z_X1mH7V1-E_L9E6S9YyO1YvYI",
    authDomain: "wms-etex.firebaseapp.com",
    projectId: "wms-etex",
    storageBucket: "wms-etex.firebasestorage.app",
    messagingSenderId: "1064547466542",
    appId: "1:1064547466542:web:0d35a64a3959c5d1941400"

  // Inicializa o Firebase
  const app = initializeApp(firebaseConfig);

<style>
  /* Estilos básicos para garantir que a página carregue visualmente */
  body { font-family: sans-serif; background: #f4f4f4; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
  .login-container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
  h2 { color: #003366; text-align: center; margin-bottom: 1.5rem; }
  input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
  button { width: 100%; padding: 10px; background: #003366; color: white; border: none; border-radius: 4px; cursor: pointer; }
  button:hover { background: #002244; }
  .error { color: red; font-size: 12px; margin-bottom: 10px; display: none; }
</style>
</head>
<body>

<div id="login-screen" class="login-container">
  <h2>Etex Gypsum WMS</h2>
  <div id="login-error" class="error">Usuário ou senha inválidos.</div>
  <input type="email" id="login-email" placeholder="E-mail" required>
  <input type="password" id="login-pass" placeholder="Senha" required>
  <button id="btn-login">Entrar</button>
</div>

<script>
  // Lógica de Login Simples
  document.addEventListener('DOMContentLoaded', () => {
    const btnLogin = document.getElementById('btn-login');
    const emailField = document.getElementById('login-email');
    const passField = document.getElementById('login-pass');
    const errorMsg = document.getElementById('login-error');

    btnLogin.addEventListener('click', async () => {
      const email = emailField.value;
      const pass = passField.value;

      try {
        // Usa o auth inicializado no script type="module" acima
        await window.auth.signInWithEmailAndPassword(window.auth, email, pass);
        alert("Login realizado com sucesso!");
        // Aqui você pode redirecionar para a dashboard ou carregar o conteúdo
      } catch (error) {
        console.error("Erro ao logar:", error);
        errorMsg.style.display = 'block';
      }
    });
  });
</script>

</body>
</html>
